# 默认配置文件
# 训练配置

# 模型配置
model:
  name: "tiny"
  vocab_size: 32000
  hidden_size: 256
  num_hidden_layers: 6
  num_attention_heads: 8
  intermediate_size: 512
  max_position_embeddings: 1024
  rope_theta: 10000.0
  rms_norm_eps: 1.0e-6
  hidden_dropout: 0.1
  attention_dropout: 0.1

# 训练配置
training:
  output_dir: "./output"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1

  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

  logging_dir: "./logs"
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  eval_steps: 500

  bf16: true
  dataloader_num_workers: 0
  seed: 42

# 数据配置
data:
  train_file: ""
  validation_file: ""
  max_seq_length: 512
  preprocessing_num_workers: 4

# 优化配置
optimization:
  gradient_checkpointing: false
  dynamic_batching: false
