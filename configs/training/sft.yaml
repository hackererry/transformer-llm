# SFT微调配置

training:
  output_dir: "./output/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2

  learning_rate: 2.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0

  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05

  logging_dir: "./logs/sft"
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  eval_steps: 500

  bf16: true
  dataloader_num_workers: 0
  seed: 42

data:
  max_seq_length: 512
  template: "alpaca"

optimization:
  gradient_checkpointing: false
